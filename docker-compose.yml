version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: grader
      POSTGRES_DB: grader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
